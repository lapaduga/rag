<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG Chat</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/chat.css">
</head>
<body>
  <div class="chat-container">
    <header class="chat-header">
      <div class="chat-header-left">
        <a href="/" class="btn btn-secondary btn-sm">← На главную</a>
        <h1>RAG Chat</h1>
      </div>
      <div class="chat-header-controls">
        <div class="mode-selector">
          <button class="mode-btn" data-mode="auto">Auto</button>
          <button class="mode-btn active" data-mode="rag">RAG</button>
          <button class="mode-btn" data-mode="no-rag">No RAG</button>
        </div>
        <div class="provider-selector">
          <button class="provider-btn" data-provider="deepseek">DeepSeek</button>
          <button class="provider-btn" data-provider="local">Local <span class="provider-status" id="ollama-status" title="Проверка Ollama...">◌</span></button>
        </div>
        <button class="btn btn-secondary btn-sm pipeline-toggle" id="btn-pipeline-toggle" onclick="togglePipelineConfig()">Pipeline ▾</button>
        <div class="sys-stats" id="sys-stats" title="Загрузка системы">
          <span class="sys-stat" id="stat-ram">RAM: --%</span>
          <span class="sys-stat" id="stat-cpu">CPU: --%</span>
        </div>
      </div>
    </header>

    <div class="pipeline-config" id="pipeline-config">
      <div class="pipeline-config-body">
        <label class="pipeline-check">
          <input type="checkbox" id="cfg-reranker"> Ранкер
        </label>
        <label class="pipeline-check">
          <input type="checkbox" id="cfg-threshold-enable"> Фильтр
          <input type="range" id="cfg-threshold" min="0" max="1" step="0.05" value="0.5" class="pipeline-range" disabled>
          <span class="pipeline-range-value" id="cfg-threshold-value">0.5</span>
        </label>
        <label class="pipeline-check">
          <input type="checkbox" id="cfg-rewrite"> Rewrite
        </label>
        <div class="pipeline-number-group">
          <label>Top-K: <input type="number" id="cfg-topk-before" value="20" min="1" max="200" class="pipeline-number"></label>
          <label>Final: <input type="number" id="cfg-topk-after" value="5" min="1" max="50" class="pipeline-number"></label>
        </div>
      </div>
    </div>

    <div class="chat-layout">
      <aside class="threads-sidebar" id="threads-sidebar">
        <div class="threads-header">
          <h2>Диалоги</h2>
          <button id="btn-new-thread" class="btn btn-primary btn-sm">+ Новый</button>
        </div>
        <div class="threads-list" id="threads-list">
          <div class="empty-state">Загрузка...</div>
        </div>
        <div class="sidebar-section memory-section" id="memory-section">
          <div class="sidebar-section-header" id="memory-section-toggle">
            <h3>Память задачи</h3>
            <span class="sidebar-section-arrow" id="memory-section-arrow">▸</span>
          </div>
          <div class="sidebar-section-body" id="memory-section-body">
            <div class="memory-content" id="memory-content">
              <span class="memory-empty">Нет сохраненной памяти</span>
            </div>
            <div class="memory-edit" id="memory-edit" style="display:none;">
              <input type="text" id="memory-goal" placeholder="Цель диалога...">
              <input type="text" id="memory-constraints" placeholder="Ограничения...">
              <button class="btn btn-sm btn-primary" id="btn-save-memory">Сохранить</button>
            </div>
            <div class="memory-actions">
              <button class="btn btn-sm btn-secondary" id="btn-toggle-memory-edit">Ред.</button>
              <button class="btn btn-sm btn-secondary" id="btn-clear-memory">Очистить память</button>
              <button class="btn btn-sm btn-danger" id="btn-clear-chat">Очистить чат</button>
            </div>
          </div>
        </div>
      </aside>

      <div class="chat-main">
        <div class="messages" id="messages">
          <div class="message assistant">
            <div class="message-content">
              <div class="message-badge mode-auto">Auto</div>
              <p>Привет! Я — ассистент по кодовой базе. Задай вопрос о проекте.</p>
            </div>
          </div>
        </div>

        <div class="input-area">
          <textarea id="question-input" rows="2" placeholder="Напишите вопрос..."></textarea>
          <div class="input-buttons">
            <button id="btn-send" class="btn btn-primary">Отправить</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="/chat.js"></script>
</body>
</html>
